<svg xmlns="http://www.w3.org/2000/svg" width="620" height="312" viewBox="0 0 620 312">
  <!-- Terminal window -->
  <rect width="620" height="312" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="620" height="36" rx="10" fill="#313244"/>
  <rect y="18" width="620" height="18" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="44" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="66" cy="18" r="6" fill="#a6e3a1"/>

  <!-- Window title -->
  <text x="310" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="12" fill="#6c7086" text-anchor="middle">claude code — my-product</text>

  <!-- Separator top -->
  <text x="16" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#7aa2f7" xml:space="preserve">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- Title -->
  <text x="16" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#cdd6f4" xml:space="preserve">  HITL AI-Driven Development — <tspan fill="#a6e3a1">platform active</tspan></text>

  <!-- Start a project label -->
  <text x="16" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#6c7086" xml:space="preserve">  Start a project:</text>

  <!-- /hitl:dev-start-from-prd -->
  <text x="16" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#cdd6f4" xml:space="preserve">    <tspan fill="#89b4fa">/hitl:dev-start-from-prd</tspan>     new project from a PRD</text>

  <!-- /hitl:dev-start-brownfield -->
  <text x="16" y="156" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#cdd6f4" xml:space="preserve">    <tspan fill="#89b4fa">/hitl:dev-start-brownfield</tspan>   onboard an existing codebase</text>

  <!-- /hitl:dev-start-migration -->
  <text x="16" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#cdd6f4" xml:space="preserve">    <tspan fill="#89b4fa">/hitl:dev-start-migration</tspan>    migrate from one system to another</text>

  <!-- Start a change label -->
  <text x="16" y="208" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#6c7086" xml:space="preserve">  Start a change:</text>

  <!-- /hitl:dev-start-change -->
  <text x="16" y="228" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#cdd6f4" xml:space="preserve">    <tspan fill="#89b4fa">/hitl:dev-start-change</tspan>   pick an issue, get the right workflow</text>

  <!-- Roles -->
  <text x="16" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#6c7086" xml:space="preserve">  Roles: <tspan fill="#cba6f7">/hitl:pm</tspan>  <tspan fill="#cba6f7">/hitl:architect</tspan>  <tspan fill="#cba6f7">/hitl:qa</tspan>  <tspan fill="#cba6f7">/hitl:ops</tspan></text>

  <!-- Separator bottom -->
  <text x="16" y="292" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#7aa2f7" xml:space="preserve">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
</svg>
