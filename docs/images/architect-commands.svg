  <rect x="17" y="368" width="746" height="36" fill="transparent"/>
  <text x="28" y="389" fill="#cba6f7" font-size="13">/architect:verify-traceability</text>
  <text x="270" y="389" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="389" fill="#a6adc8" font-size="12">Integration verify — issue → design → code → tests → brief chain</text>

