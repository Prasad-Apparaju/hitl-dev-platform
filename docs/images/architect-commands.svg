<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 628" width="780" height="628" font-family="'Menlo','Monaco','Consolas','Courier New',monospace">
  <!-- Window chrome -->
  <rect width="780" height="628" rx="10" fill="#1e1e2e"/>
  <rect width="780" height="38" rx="10" fill="#313244"/>
