  <rect x="17" y="404" width="746" height="20" fill="#2e2a1a"/>
  <text x="28" y="418" fill="#f9e2af" font-size="10" font-weight="bold" letter-spacing="1">WHEN COVERING QA</text>
  <text x="672" y="418" fill="#45475a" font-size="10">2 commands</text>

  <!-- Row 5: qa:review-tests -->
  <rect x="17" y="424" width="746" height="36" fill="transparent"/>
  <text x="28" y="445" fill="#cba6f7" font-size="13">/qa:review-tests</text>
  <text x="270" y="445" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="445" fill="#a6adc8" font-size="12">Formal test coverage review — ACs, LLD edge cases, incident regressions</text>

  <!-- Row 6: qa:verify-quality -->
  <rect x="17" y="460" width="746" height="36" fill="transparent"/>
  <text x="28" y="481" fill="#cba6f7" font-size="13">/qa:verify-quality</text>
  <text x="270" y="481" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="481" fill="#a6adc8" font-size="12">Post-handoff independent quality verification — block or approve promotion</text>

  <!-- Section 3: WHEN COVERING OPS (2) -->
  <rect x="17" y="496" width="746" height="20" fill="#2e1a1a"/>
  <text x="28" y="510" fill="#f38ba8" font-size="10" font-weight="bold" letter-spacing="1">WHEN COVERING OPS</text>
  <text x="672" y="510" fill="#45475a" font-size="10">2 commands</text>

  <!-- Row 7: ops:review-release -->
  <rect x="17" y="516" width="746" height="36" fill="transparent"/>
  <text x="28" y="537" fill="#cba6f7" font-size="13">/ops:review-release</text>
  <text x="270" y="537" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="537" fill="#a6adc8" font-size="12">Assess rollout plan, canary criteria, observability, and rollback before release</text>

  <!-- Row 8: ops:monitor-canary -->
  <rect x="17" y="552" width="746" height="36" fill="transparent"/>
  <text x="28" y="573" fill="#cba6f7" font-size="13">/ops:monitor-canary</text>
  <text x="270" y="573" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="573" fill="#a6adc8" font-size="12">Read dashboards for active canary — produce go/no-go recommendation</text>

  <!-- Separator + nav hint -->
  <line x1="16" y1="590" x2="764" y2="590" stroke="#45475a" stroke-width="1" opacity="0.5"/>
  <text x="28" y="604" fill="#6c7086" font-size="11">↑↓ navigate   ↵ select   esc dismiss   —   type to filter</text>
  <text x="600" y="604" fill="#45475a" font-size="11">from .claude/commands/</text>

  <!-- Footer -->
  <rect x="0" y="610" width="780" height="18" fill="#313244" opacity="0.5"/>
  <text x="16" y="623" fill="#6c7086" font-size="11">CLAUDE.md  ·  system-manifest.yaml  ·  4 architect + 2 qa + 2 ops commands  —  also use /qa: and /ops: namespaces</text>
</svg>
