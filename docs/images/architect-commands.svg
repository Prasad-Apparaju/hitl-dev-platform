  <circle cx="20" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="19" r="6" fill="#a6e3a1"/>
  <text x="390" y="24" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code — your-project · Architect</text>

  <!-- Status bar -->
  <rect x="16" y="52" width="748" height="28" rx="4" fill="#1e3a1e" stroke="#a6e3a1" stroke-width="1" opacity="0.9"/>
