  <rect x="16" y="228" width="748" height="12" fill="#313244"/>
  <text x="28" y="230" fill="#6c7086" font-size="11">AVAILABLE COMMANDS  (8)  —  own namespace + qa + ops when covering those roles</text>

  <!-- Section 1: ARCHITECT COMMANDS (4) -->
  <rect x="17" y="240" width="746" height="20" fill="#1a2744"/>
  <text x="28" y="254" fill="#89b4fa" font-size="10" font-weight="bold" letter-spacing="1">ARCHITECT COMMANDS</text>
  <text x="672" y="254" fill="#45475a" font-size="10">4 commands</text>

  <!-- Row 1: design-system (highlighted) -->
  <rect x="17" y="260" width="746" height="36" fill="#313244" rx="0"/>
  <text x="28" y="281" fill="#cba6f7" font-size="13" font-weight="bold">/architect:design-system</text>
  <text x="270" y="281" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="281" fill="#a6adc8" font-size="12">Design new system from PRD — domains, manifest, HLDs, ADRs, LLDs</text>

  <!-- Row 2: design-feature -->
  <rect x="17" y="296" width="746" height="36" fill="transparent"/>
  <text x="28" y="317" fill="#cba6f7" font-size="13">/architect:design-feature</text>
  <text x="270" y="317" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="317" fill="#a6adc8" font-size="12">Steps 3–9: impact analysis, HLD, LLD, slice decomp, decision packets</text>

  <!-- Row 3: review-design -->
  <rect x="17" y="332" width="746" height="36" fill="transparent"/>
  <text x="28" y="353" fill="#cba6f7" font-size="13">/architect:review-design</text>
  <text x="270" y="353" fill="#6c7086" font-size="12">  ·</text>
  <text x="283" y="353" fill="#a6adc8" font-size="12">Review HLD, LLD, ADR — approve design before implementation starts</text>

