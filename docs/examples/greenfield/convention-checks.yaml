# Convention Checks Configuration
# Project-specific checks for the pluggable convention checker.
# Replace the sample checks below with your project's actual conventions.
#
# Check types:
#   subclass_method_check — verify subclasses implement required methods
#   import_check          — verify required imports in matching files
#   pattern_check         — verify co-occurrence of patterns
#   file_contains         — verify file content requirements
#
# See also: ci/convention-check.yml for CI integration

checks:
  # --- Universal checks (keep these) ---

  manifest_drift:
    type: manifest_drift
    description: "System manifest matches the current codebase"
    manifest: docs/system-manifest.yaml

  mermaid_br_tags:
    type: mermaid_br_tags
    description: "No <br/> tags inside Mermaid blocks (Obsidian incompatible)"
    glob: "docs/**/*.md"

  inline_comments:
    type: inline_comments
    description: "Generated code has inline comments explaining non-obvious logic"

