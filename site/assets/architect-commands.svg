  <rect x="17" y="640" width="746" height="20" fill="#2e1a1a"/>
  <text x="28" y="654" fill="#f38ba8" font-size="10" font-weight="bold" letter-spacing="1">WHEN COVERING OPS</text>
  <text x="672" y="654" fill="#45475a" font-size="10">2 commands</text>

  <!-- Row 10: ops-review-release -->
  <rect x="17" y="660" width="746" height="36" fill="transparent"/>
  <text x="28" y="681" fill="#cba6f7" font-size="13">/hitl:ops-review-release</text>
  <text x="310" y="681" fill="#6c7086" font-size="12">  ·</text>
  <text x="323" y="681" fill="#a6adc8" font-size="12">Assess rollout plan, canary criteria, observability, and rollback before release</text>

