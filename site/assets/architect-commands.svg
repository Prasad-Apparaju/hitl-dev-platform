  <rect x="0" y="754" width="780" height="18" fill="#313244" opacity="0.5"/>
  <text x="16" y="767" fill="#6c7086" font-size="11">CLAUDE.md  ·  system-manifest.yaml  ·  6 architect + 4 qa + 2 ops commands  —  also use /hitl:qa- and /hitl:ops- commands</text>
