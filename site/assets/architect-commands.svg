  <text x="310" y="589" fill="#6c7086" font-size="12">  ·</text>
  <text x="323" y="589" fill="#a6adc8" font-size="12">Post-handoff independent quality verification — block or approve promotion</text>

  <!-- Row 9: qa-report-defect -->
  <rect x="17" y="604" width="746" height="36" fill="transparent"/>
  <text x="28" y="625" fill="#cba6f7" font-size="13">/hitl:qa-report-defect</text>
  <text x="310" y="625" fill="#6c7086" font-size="12">  ·</text>
  <text x="323" y="625" fill="#a6adc8" font-size="12">File structured defect when blocking — AC reference, repro steps, severity</text>

