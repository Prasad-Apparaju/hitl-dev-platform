# Test Case Registry
#
# A queryable catalog of test cases with metadata. The actual test code
# lives in the test files — this registry tracks WHAT is tested, WHY it
# was added, and HOW it maps to domains, risk levels, and incidents.
#
# Consumed at:
#   - Impact analysis (step 2): "which tests cover the affected area?"
#   - TDD test generation (step 6): AI reads relevant entries to inform what to generate
#   - QA review (step 7): QA checks "is the incident-regression test for INC-X here?"
#
# Updated at:
#   - TDD cycle (step 7): every new test case gets an entry
#   - Post-incident: regression test linked to the incident entry

test_cases:
  # ── Example: contract test from manifest facade ──
  - id: TC-001
    name: "Publish rejects missing idempotency key"
    domain: publishing
    risk: high          # low | medium | high | critical
    type: contract      # unit | integration | contract | e2e | exploratory
    origin: tdd         # tdd | qa-review | incident-regression | design-pr
    covers: "MutatingTool.execute() rejects empty idempotency_key"
    incident_ref: null  # INC-XXX if added after an incident
    file: "tests/test_idempotency_keys.py::test_missing_key_rejected"
    added_in: "PR-52"
    last_verified: "2026-04-09"

  # ── Example: regression test from production incident ──
  - id: TC-002
    name: "Duplicate publish prevented on retry after timeout"
    domain: publishing
    risk: critical
    type: integration
    origin: incident-regression
    covers: "MutatingTool idempotency dedup on concurrent insert race"
    incident_ref: INC-001
    file: "tests/test_idempotency_keys.py::test_race_condition_returns_cached"
    added_in: "PR-53"
    last_verified: "2026-04-09"

  # ── Example: QA-added edge case ──
  - id: TC-003
    name: "Carousel publish with exactly 10 images succeeds"
    domain: publishing
    risk: medium
    type: integration
    origin: qa-review
    covers: "InstagramPublishTool carousel boundary (max 10 images)"
    incident_ref: null
    file: "tests/test_instagram_agent.py::test_carousel_max_images"
    added_in: "PR-55"
    last_verified: "2026-04-10"

# ── How to query this registry ──
#
# By domain:     grep "domain: publishing" test-registry.yaml
# By risk:       grep "risk: critical" test-registry.yaml
# By incident:   grep "incident_ref: INC-001" test-registry.yaml
# By origin:     grep "origin: incident-regression" test-registry.yaml
# Coverage gap:  domains in system-manifest.yaml with no test_cases entries
