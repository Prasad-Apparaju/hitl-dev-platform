name: Manifest Drift Check
on: [pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Check manifest drift
        run: python tools/check-conventions/runner.py --config convention-checks.yaml --only manifest_drift
