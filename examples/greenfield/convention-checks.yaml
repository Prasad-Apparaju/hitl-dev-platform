# Convention checks for this project.
# Universal checks come from the platform.
# Project checks are specific to this codebase.

universal_checks:
  - manifest_drift
  - mermaid_br_tags
  - inline_comments

project_checks:
  - name: pydantic_validation
    description: "API endpoints must use Pydantic request models"
    type: import_check
    directory: app/controllers
    required_import: "BaseModel"
    trigger_imports: [APIRouter, router]

  - name: parameterized_queries
    description: "No string interpolation in SQL queries"
    type: pattern_check
    directory: app/
    trigger_pattern: ".execute("
    forbidden_pattern: 'f"'
