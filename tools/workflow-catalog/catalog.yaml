# Numberless workflow catalog — Phase-1 source of truth.
#
# Stable `key`s, first-class `phases`, no stored `n`/`total`. The generator
# (tools/workflow-catalog/derive.py) derives positional numbers (n, total,
# phase.step) for the runtime view. Numbers live only at the display layer.
#
# Step fields:
#   key     — STABLE identifier. Survives renumbering.
#   name    — readable human name (not reproduction-critical).
#   label   — short breadcrumb label (matches runtime exactly).
#   phase   — workflow phase this step belongs to (matches runtime exactly).
#   substep — true for a sub-step that shares its parent's integer (e.g. 19a).
#   parent  — for a substep, the `key` of the step it hangs off.
#   cond    — conditional spine slot; included only when its activator is active.
#   command — the skill/command that executes the step, or the literal `manual`
#             (human-run, no command) or `guided` (driven by a ref doc, no skill).
#             ADDITIVE: feeds the command-map view; does NOT affect derivation.
#   role    — the owning role: PM / Architect / Dev / QA / Ops / TA.
#             ADDITIVE: feeds the command-map view; does NOT affect derivation.
#
# `verify` proves this numberless catalog reproduces the runtime workflows.yaml
# on n/key/label/phase/total. Do not strip or reorder the spine steps.

schema_version: "3.0-numberless"

spine:
  title: "Development — deliver a change"
  phases: [Requirements, Design, Build, Verify, Assess, Ship, Post-Ship]
  steps:
    # ── Requirements ──────────────────────────────────────────────
    - { key: issue,              name: "GitHub Issue",                 label: "Issue",    phase: "Requirements", command: manual,                       role: PM }
    - { key: figma,              name: "Figma Review",                 label: "Figma",    phase: "Requirements", command: manual,                       role: PM }
    # ── Design ────────────────────────────────────────────────────
    - { key: impact,             name: "Impact Analysis",              label: "Impact",   phase: "Design", command: dev-apply-change,             role: Dev }
    - { key: roi,                name: "ROI Estimate",                 label: "ROI",      phase: "Design", command: guided,                       role: PM }
    - { key: docs,               name: "Update Docs",                  label: "Docs",     phase: "Design", command: dev-generate-docs,            role: Architect }
    - { key: iac,                name: "Update IaC",                   label: "IaC",      phase: "Design", command: ops-apply-iac,                role: Ops }
    - { key: test_plan,          name: "Test Case Planning",           label: "Tests",    phase: "Design", command: qa-plan-tests,                role: QA }
    - { key: training,           name: "Training Plan Stub",           label: "Train",    phase: "Design", command: guided,                       role: PM }
    - { key: packet,             name: "Package Decision Packet",      label: "Packet",   phase: "Design", command: manual,                       role: Architect }
    - { key: baseline,           name: "Baseline Measurement",         label: "Basln",    phase: "Design", cond: perf,     command: ops-measure-baseline,         role: Ops }
    - { key: sec_design,         name: "Security Design Review",       label: "SecDsn",   phase: "Design", cond: security, command: dev-review-security,          role: Architect }
    - { key: cve_audit,          name: "Dependency + CVE Audit",       label: "CVE",      phase: "Design", cond: upgrade,  command: ops-audit-dependencies,       role: Ops }
    # ── Build (TDD cycle) ─────────────────────────────────────────
    - { key: red,                name: "AI Generates Tests (RED)",     label: "RED",      phase: "Build", command: dev-tdd,                      role: Dev }
    - { key: test_review,        name: "Human Reviews Tests",          label: "TstRvw",   phase: "Build", command: qa-review-tests,              role: QA }
    - { key: design_plus,        name: "Tests Improve the Design",     label: "Dsn+",     phase: "Build", command: dev-tdd,                      role: Dev }
    - { key: verify_red,         name: "Verify RED",                   label: "VfyRED",   phase: "Build", command: manual,                       role: Dev }
    - { key: green,              name: "Generate Code (GREEN)",        label: "GREEN",    phase: "Build", command: dev-tdd,                      role: Dev }
    - { key: verify_green,       name: "Verify GREEN",                 label: "VfyGRN",   phase: "Build", command: manual,                       role: Dev }
    - { key: refactor,           name: "Refactor",                     label: "Refact",   phase: "Build", command: manual,                       role: Dev }
    - { key: conventions,        name: "Convention Checks",            label: "Conv",     phase: "Build", command: dev-check-conventions,        role: Dev }
    # ── Verify ────────────────────────────────────────────────────
    - { key: review1,            name: "Code Review Round 1",          label: "Rvw1",     phase: "Verify", command: dev-review-lld-adherence,     role: Dev }
    - { key: review2,            name: "Code Review Round 2",          label: "Rvw2",     phase: "Verify", command: dev-review-security,          role: Dev }
    - { key: arch_review,        name: "Architect Code Review",        label: "ArchRvw",  phase: "Verify", substep: true, parent: review2, command: architect-review-code, role: Architect }
    - { key: rerun,              name: "Rerun Tests",                  label: "Rerun",    phase: "Verify", command: manual,                       role: Dev }
    - { key: reconcile,          name: "Reconcile Docs",               label: "Recncl",   phase: "Verify", command: dev-generate-docs,            role: Dev }
    - { key: qa_verify,          name: "QA Post-Handoff Verification", label: "QAVfy",    phase: "Verify", command: qa-verify-quality,            role: QA }
    # ── Assess ────────────────────────────────────────────────────
    - { key: impact_brief,       name: "Downstream Impact Brief",      label: "ImpBrf",   phase: "Assess", command: dev-impact-brief,             role: Dev }
    - { key: rollout,            name: "Risk-Rated Rollout Plan",      label: "Rollout",  phase: "Assess", command: ops-review-release,           role: Ops }
    # ── Ship ──────────────────────────────────────────────────────
    - { key: verify_pr,          name: "Verify PR Completeness",       label: "VfyPR",    phase: "Ship", command: manual,                       role: Dev }
    - { key: integration_verify, name: "Integration Verification",     label: "IntVfy",   phase: "Ship", command: architect-verify-traceability, role: Architect }
    - { key: figma_compare,      name: "Figma Comparison",             label: "Figma2",   phase: "Ship", command: manual,                       role: QA }
    - { key: deploy,             name: "Build, Migrate, Apply, Deploy",label: "Deploy",   phase: "Ship", command: ops-deploy,                   role: Ops }
    - { key: pentest,            name: "Penetration Test",             label: "Pentest",  phase: "Ship",   cond: security, command: ops-pentest,                 role: Ops }
    - { key: promote,            name: "Promote or Rollback",          label: "Promote",  phase: "Ship", command: ops-post-deploy-monitor,      role: Ops }
    # ── Post-Ship ─────────────────────────────────────────────────
    - { key: roi_30,             name: "30-Day ROI Check",             label: "30dROI",   phase: "Post-Ship", command: guided,                       role: PM }
    - { key: roi_90,             name: "90-Day ROI Check",             label: "90dROI",   phase: "Post-Ship", command: guided,                       role: PM }

workflows:

  # ── Brownfield setup: onboard an existing codebase ──────────────
  brownfield:
    title: "Brownfield — onboard an existing codebase"
    phases: [Brownfield Setup]
    steps:
      - { key: map_code,         name: "Map Codebase",                 label: "MapCode",    phase: "Brownfield Setup" }
      - { key: claude_md,        name: "Generate CLAUDE.md",           label: "CLAUDE.md",  phase: "Brownfield Setup" }
      - { key: manifest,         name: "Generate Manifest",            label: "Manifest",   phase: "Brownfield Setup" }
      - { key: arch_review,      name: "Architect Review",             label: "ArchRvw",    phase: "Brownfield Setup" }
      - { key: verify_pipeline,  name: "Verify Pipeline",              label: "Pipeline",   phase: "Brownfield Setup" }
      - { key: observability,    name: "Observability Setup",          label: "Observ",     phase: "Brownfield Setup" }
      - { key: priority_docs,    name: "Priority Docs",                label: "Docs",       phase: "Brownfield Setup" }
      - { key: seed_registries,  name: "Seed Registries",              label: "Registries", phase: "Brownfield Setup" }
      - { key: graphify,         name: "Graphify",                     label: "Graphify",   phase: "Brownfield Setup" }
      - { key: create_issue,     name: "Create Issue",                 label: "Issue",      phase: "Brownfield Setup" }
      - { key: confirm_ready,    name: "Confirm Ready",                label: "Ready",      phase: "Brownfield Setup" }

  # ── Migration setup: stand up a target for a system migration ────
  migration:
    title: "Migration — set up a target for a system migration"
    phases: [Migration Setup]
    steps:
      - { key: collect_context,  name: "Collect Context",              label: "Context",    phase: "Migration Setup" }
      - { key: claude_md,        name: "Generate CLAUDE.md",           label: "CLAUDE.md",  phase: "Migration Setup" }
      - { key: manifest,         name: "Generate Manifest",            label: "Manifest",   phase: "Migration Setup" }
      - { key: dir_setup,        name: "Directory Setup",              label: "DirSetup",   phase: "Migration Setup" }
      - { key: source_analysis,  name: "Source Analysis",              label: "SrcAnal",    phase: "Migration Setup" }
      - { key: ext_docs,         name: "External Docs",                label: "ExtDocs",    phase: "Migration Setup" }
      - { key: seed_registries,  name: "Seed Registries",              label: "Registries", phase: "Migration Setup" }
      - { key: create_issue,     name: "Create Issue",                 label: "Issue",      phase: "Migration Setup" }
      - { key: confirm_ready,    name: "Confirm Ready",                label: "Ready",      phase: "Migration Setup" }

  # ── Migration review: critically evaluate external migration docs ─
  migration_review:
    title: "Migration Review — evaluate external migration docs"
    phases: [Migration Review]
    steps:
      - { key: read_context,     name: "Read Context",                 label: "Context",  phase: "Migration Review" }
      - { key: evaluate,         name: "Evaluate Docs",                label: "Evaluate", phase: "Migration Review" }
      - { key: write_review,     name: "Write Migration Review",       label: "MigRvw",   phase: "Migration Review" }
      - { key: write_brief,      name: "Write Brief",                  label: "Brief",    phase: "Migration Review" }
      - { key: handoff,          name: "Handoff",                      label: "Handoff",  phase: "Migration Review" }

  # ── Greenfield setup: stand up a greenfield project from a PRD ───
  # Runtime id: prd
  greenfield:
    title: "PRD — stand up a greenfield project from a PRD"
    phases: [PRD Setup]
    steps:
      - { key: claude_md,        name: "Generate CLAUDE.md",           label: "CLAUDE.md", phase: "PRD Setup" }
      - { key: manifest,         name: "Generate Manifest",            label: "Manifest",  phase: "PRD Setup" }
      - { key: create_issue,     name: "Create Issue",                 label: "Issue",     phase: "PRD Setup" }
      - { key: confirm_ready,    name: "Confirm Ready",                label: "Ready",     phase: "PRD Setup" }

  # ── Docs change: a documentation-only change ────────────────────
  # Its own short spine (no code, no TDD) with a domain-routed reviewer gate.
  # Chosen only when a change touches nothing but docs; mixed changes use the
  # delivery spine. See docs/design/workflow-model/01-design.md §4.
  docs:
    title: "Docs — a documentation-only change"
    phases: [Docs Change]
    steps:
      - { key: issue,            name: "GitHub Issue",                 label: "Issue",     phase: "Docs Change" }
      - { key: scope,            name: "Scope Docs Impact",            label: "Scope",     phase: "Docs Change" }
      - { key: draft,            name: "Write / Update Docs",          label: "Draft",     phase: "Docs Change" }
      - { key: doc_review,       name: "Docs Review",                  label: "Review",    phase: "Docs Change" }
      - { key: reconcile,        name: "Reconcile Cross-Refs",         label: "Reconcile", phase: "Docs Change" }
      - { key: merge,            name: "Merge",                        label: "Merge",     phase: "Docs Change" }

# ── Delivery profiles: named presets over the shared spine ──────────────────────────────────
# A profile selects which conditional spine slots are on (`activates`, by cond activator),
# drops steps that don't apply (`excludes`, by key), and contributes a `required_evidence` set
# (impact analysis may extend it per change — see docs/design/workflow-model/03-execution-model.md).
# `feature` is the base: no conditionals, nothing excluded == the runtime `development` workflow.
profiles:
  feature:
    class: functional
    initiator: PM
    activates: []
    excludes: []
    required_evidence: [tests_red, tests_green, spec_conformance_review, qa_review, downstream_impact_brief]
  enhancement:
    class: functional
    initiator: PM
    activates: []
    excludes: []
    required_evidence: [tests_red, tests_green, spec_conformance_review, qa_review, downstream_impact_brief, back_compat]
  fix:
    class: functional
    initiator: PM/QA
    activates: []
    excludes: [roi, training]
    required_evidence: [tests_red, tests_green, qa_review, regression_test]
  tech_change:
    class: technical
    initiator: Dev/Arch
    activates: []
    excludes: [figma, roi, training, figma_compare]
    required_evidence: [tests_red, tests_green, spec_conformance_review]
  upgrade:
    class: technical
    initiator: Dev/Ops
    activates: [upgrade]
    excludes: [figma, training, figma_compare]
    required_evidence: [cve_audit, full_regression, spec_conformance_review]
  security:
    class: technical
    initiator: Sec/Arch/Ops
    activates: [security]
    excludes: [figma, training, figma_compare]
    required_evidence: [security_review, pentest, tests_green]
    skip_authority: { security_review: never, pentest: never }

# ── Change-kind tags: stack on a profile, tune required-evidence ─────────────────────────────
# A tag may activate a conditional spine slot (e.g. perf -> baseline) and adds evidence. Tags
# compose: {Fix, perf, upgrade} unions all three evidence sets. `chore` is Tier-0 (floor only).
tags:
  refactor: { activates: [],     required_evidence: [characterization_tests, behavior_unchanged] }
  perf:     { activates: [perf], required_evidence: [perf_budget_met] }
  chore:    { tier: 0, activates: [], required_evidence: [] }
  tooling:  { activates: [],     required_evidence: [] }
  infra:    { activates: [],     required_evidence: [] }
